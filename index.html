<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ping Pong JS</title>
    <style>
        body {
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 5px solid #fff;
            background-color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 50px;
        }
    </style>
</head>
<body>

    <h2>Ping Pong - 2 Jogadores</h2>
    <canvas id="pong" width="800" height="400"></canvas>
    
    <div class="controls">
        <p>Esquerda: <b>W / S</b></p>
        <p>Direita: <b>↑ / ↓</b></p>
    </div>

<script>
    const canvas = document.getElementById("pong");
    const ctx = canvas.getContext("2d");

    // Configurações dos Jogadores
    const paddleWidth = 10, paddleHeight = 80;
    let leftPaddleY = (canvas.height - paddleHeight) / 2;
    let rightPaddleY = (canvas.height - paddleHeight) / 2;
    const paddleSpeed = 7;

    // Configurações da Bola
    let ballX = canvas.width / 2, ballY = canvas.height / 2;
    let ballSize = 8;
    let ballSpeedX = 5, ballSpeedY = 5;

    // Placar
    let scoreLeft = 0, scoreRight = 0;

    // Controle de Teclas
    const keys = {};
    document.addEventListener("keydown", e => keys[e.code] = true);
    document.addEventListener("keyup", e => keys[e.code] = false);

    function resetBall() {
        ballX = canvas.width / 2;
        ballY = canvas.height / 2;
        ballSpeedX = -ballSpeedX; // Inverte a direção
    }

    function update() {
        // Movimento Jogador Esquerda (W e S)
        if (keys["KeyW"] && leftPaddleY > 0) leftPaddleY -= paddleSpeed;
        if (keys["KeyS"] && leftPaddleY < canvas.height - paddleHeight) leftPaddleY += paddleSpeed;

        // Movimento Jogador Direita (Setas)
        if (keys["ArrowUp"] && rightPaddleY > 0) rightPaddleY -= paddleSpeed;
        if (keys["ArrowDown"] && rightPaddleY < canvas.height - paddleHeight) rightPaddleY += paddleSpeed;

        // Movimento da Bola
        ballX += ballSpeedX;
        ballY += ballSpeedY;

        // Colisão com teto e chão
        if (ballY <= 0 || ballY + ballSize >= canvas.height) {
            ballSpeedY *= -1;
        }

        // Colisão com Raquete Esquerda
        if (ballX <= paddleWidth + 5 && ballY > leftPaddleY && ballY < leftPaddleY + paddleHeight) {
            ballSpeedX *= -1.1; // Aumenta velocidade gradualmente
        }

        // Colisão com Raquete Direita
        if (ballX >= canvas.width - paddleWidth - 15 && ballY > rightPaddleY && ballY < rightPaddleY + paddleHeight) {
            ballSpeedX *= -1.1;
        }

        // Pontuação
        if (ballX < 0) {
            scoreRight++;
            resetBall();
        } else if (ballX > canvas.width) {
            scoreLeft++;
            resetBall();
        }
    }

    function draw() {
        // Limpar tela
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Linha central
        ctx.strokeStyle = "#fff";
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();

        // Desenhar Raquetes
        ctx.fillStyle = "#fff";
        ctx.fillRect(5, leftPaddleY, paddleWidth, paddleHeight); // Esquerda
        ctx.fillRect(canvas.width - paddleWidth - 5, rightPaddleY, paddleWidth, paddleHeight); // Direita

        // Desenhar Bola
        ctx.fillRect(ballX, ballY, ballSize, ballSize);

        // Desenhar Placar
        ctx.font = "30px Arial";
        ctx.fillText(scoreLeft, canvas.width / 4, 50);
        ctx.fillText(scoreRight, 3 * canvas.width / 4, 50);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
