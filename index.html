<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ping Pong JS - Equilibrado</title>
    <style>
        body {
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 5px solid #fff;
            background-color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 50px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Ping Pong - Equilibrado</h2>
    <canvas id="pong" width="800" height="400"></canvas>
    
    <div class="controls">
        <div>Esquerda: <b>W / S</b></div>
        <div>Direita: <b>↑ / ↓</b></div>
    </div>

<script>
    const canvas = document.getElementById("pong");
    const ctx = canvas.getContext("2d");

    // Configurações Físicas
    const INITIAL_SPEED = 4;      // Velocidade ao reiniciar
    const MAX_SPEED = 14;         // Limite de velocidade máxima
    const SPEED_INCREMENT = 1.1;  // Multiplicador de velocidade por batida

    // Jogadores
    const paddleWidth = 10, paddleHeight = 80;
    let leftPaddleY = (canvas.height - paddleHeight) / 2;
    let rightPaddleY = (canvas.height - paddleHeight) / 2;
    const paddleSpeed = 8;

    // Bola
    let ballX = canvas.width / 2, ballY = canvas.height / 2;
    let ballSize = 10;
    let ballSpeedX = INITIAL_SPEED;
    let ballSpeedY = INITIAL_SPEED;

    // Placar
    let scoreLeft = 0, scoreRight = 0;

    // Teclado
    const keys = {};
    document.addEventListener("keydown", e => keys[e.code] = true);
    document.addEventListener("keyup", e => keys[e.code] = false);

    // Função de Reinício Sugerida: vai para o lado que tomou o ponto e devagar
    function resetBall(winner) {
        ballX = canvas.width / 2;
        ballY = canvas.height / 2;
        
        // Se a Direita ganhou o ponto, a bola vai para a Esquerda (lado que sofreu o ponto)
        // Se a Esquerda ganhou, a bola vai para a Direita.
        ballSpeedX = (winner === "left") ? INITIAL_SPEED : -INITIAL_SPEED;
        
        // Direção vertical aleatória para não ser sempre igual
        ballSpeedY = (Math.random() > 0.5 ? 1 : -1) * INITIAL_SPEED;
    }

    function update() {
        // Movimento Raquetes
        if (keys["KeyW"] && leftPaddleY > 0) leftPaddleY -= paddleSpeed;
        if (keys["KeyS"] && leftPaddleY < canvas.height - paddleHeight) leftPaddleY += paddleSpeed;
        if (keys["ArrowUp"] && rightPaddleY > 0) rightPaddleY -= paddleSpeed;
        if (keys["ArrowDown"] && rightPaddleY < canvas.height - paddleHeight) rightPaddleY += paddleSpeed;

        // Movimento Bola
        ballX += ballSpeedX;
        ballY += ballSpeedY;

        // Colisão Teto/Chão
        if (ballY <= 0 || ballY + ballSize >= canvas.height) {
            ballSpeedY *= -1;
        }

        // Colisão Raquete Esquerda
        if (ballX <= paddleWidth + 5 && ballY > leftPaddleY && ballY < leftPaddleY + paddleHeight) {
            // Inverte e aumenta velocidade se não atingiu o limite
            if (Math.abs(ballSpeedX) < MAX_SPEED) ballSpeedX *= SPEED_INCREMENT;
            ballSpeedX = Math.abs(ballSpeedX); // Garante que vá para a direita
        }

        // Colisão Raquete Direita
        if (ballX >= canvas.width - paddleWidth - 15 && ballY > rightPaddleY && ballY < rightPaddleY + paddleHeight) {
            if (Math.abs(ballSpeedX) < MAX_SPEED) ballSpeedX *= SPEED_INCREMENT;
            ballSpeedX = -Math.abs(ballSpeedX); // Garante que vá para a esquerda
        }

        // Pontuação
        if (ballX < 0) {
            scoreRight++;
            resetBall("right"); // Esquerda sofreu o ponto, bola vai para a esquerda
        } else if (ballX > canvas.width) {
            scoreLeft++;
            resetBall("left"); // Direita sofreu o ponto, bola vai para a direita
        }
    }

    function draw() {
        // Fundo
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Rede
        ctx.strokeStyle = "#444";
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();

        // Raquetes
        ctx.fillStyle = "#fff";
        ctx.fillRect(5, leftPaddleY, paddleWidth, paddleHeight);
        ctx.fillRect(canvas.width - paddleWidth - 5, rightPaddleY, paddleWidth, paddleHeight);

        // Bola
        ctx.fillRect(ballX, ballY, ballSize, ballSize);

        // Placar
        ctx.font = "bold 40px Arial";
        ctx.fillText(scoreLeft, canvas.width / 4, 60);
        ctx.fillText(scoreRight, 3 * canvas.width / 4, 60);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
