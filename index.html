<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Game - Clone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f7f7f7;
            font-family: 'Courier New', Courier, monospace;
        }

        #game-container {
            width: 600px;
            height: 200px;
            border-bottom: 2px solid #535353;
            background-color: white;
            position: relative;
            overflow: hidden;
        }

        #dino {
            width: 40px;
            height: 40px;
            background-color: #535353;
            position: absolute;
            bottom: 0;
            left: 50px;
        }

        .cactus {
            width: 20px;
            height: 40px;
            background-color: #ff4d4d;
            position: absolute;
            bottom: 0;
            right: -20px;
        }

        #score {
            position: absolute;
            top: 10px;
            right: 20px;
            color: #535353;
            font-size: 20px;
        }

        .animate-jump {
            animation: jump 0.5s linear;
        }

        @keyframes jump {
            0% { bottom: 0; }
            30% { bottom: 100px; }
            70% { bottom: 100px; }
            100% { bottom: 0; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score">0</div>
        <div id="dino"></div>
    </div>

    <script>
        const dino = document.getElementById("dino");
        const container = document.getElementById("game-container");
        const scoreElement = document.getElementById("score");
        let score = 0;
        let isGameOver = false;

        // Função para o Dino pular
        function jump() {
            if (!dino.classList.contains("animate-jump")) {
                dino.classList.add("animate-jump");
                setTimeout(() => {
                    dino.classList.remove("animate-jump");
                }, 500);
            }
        }

        // Listener para tecla Espaço ou clique
        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") jump();
        });

        // Criar cactos aleatórios
        function createCactus() {
            if (isGameOver) return;

            const cactus = document.createElement("div");
            cactus.classList.add("cactus");
            container.appendChild(cactus);

            let cactusPos = 600;
            
            let moveInterval = setInterval(() => {
                if (isGameOver) {
                    clearInterval(moveInterval);
                    return;
                }

                cactusPos -= 5;
                cactus.style.left = cactusPos + "px";

                // Detecção de Colisão
                let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));
                
                if (cactusPos > 50 && cactusPos < 90 && dinoBottom <= 40) {
                    gameOver();
                    clearInterval(moveInterval);
                }

                // Remove cacto quando sai da tela e soma pontuação
                if (cactusPos < -20) {
                    clearInterval(moveInterval);
                    container.removeChild(cactus);
                    score++;
                    scoreElement.innerText = score;
                }
            }, 20);

            // Gera o próximo cacto em tempo aleatório
            let randomTime = Math.random() * (2000 - 700) + 700;
            setTimeout(createCactus, randomTime);
        }

        function gameOver() {
            isGameOver = true;
            alert("Game Over! Pontuação: " + score);
            location.reload(); // Recarrega a página para reiniciar
        }

        createCactus();
    </script>
</body>
</html>
