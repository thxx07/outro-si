<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arena PvP - Battle Guys</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; }
        canvas { background: #2c3e50; border: 5px solid #ecf0f1; border-radius: 10px; margin-top: 10px; cursor: none; }
        .ui { display: flex; justify-content: space-between; width: 800px; margin-top: 20px; }
        .player-info { width: 300px; }
        .hb-bg { width: 100%; height: 25px; background: #c0392b; border: 3px solid #fff; border-radius: 5px; overflow: hidden; }
        .hb-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.2s; }
        .weapon-tag { font-size: 14px; color: #f1c40f; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="ui">
        <div class="player-info">
            <div>P1 (AZUL)</div>
            <div class="hb-bg"><div id="hp1" class="hb-fill"></div></div>
            <div id="w1" class="weapon-tag">Punhos (Dano: 5)</div>
        </div>
        <div class="player-info" style="text-align: right;">
            <div>P2 (VERMELHO)</div>
            <div class="hb-bg"><div id="hp2" class="hb-fill"></div></div>
            <div id="w2" class="weapon-tag">Punhos (Dano: 5)</div>
        </div>
    </div>

    <canvas id="game" width="800" height="450"></canvas>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const keys = {};
    document.addEventListener("keydown", e => keys[e.code] = true);
    document.addEventListener("keyup", e => keys[e.code] = false);

    let items = [];

    class Player {
        constructor(x, y, color, controls, id) {
            this.id = id;
            this.x = x;
            this.y = y;
            this.width = 40;
            this.height = 60;
            this.color = color;
            this.controls = controls;
            this.hp = 100;
            this.damage = 5;
            this.speed = 4;
            this.facing = id === 1 ? 1 : -1; // 1 direita, -1 esquerda
            
            this.isAttacking = false;
            this.canAttack = true;
            this.attackAngle = 0;
            this.hitCooldown = false;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x + this.width/2, this.y + this.height/2);

            // Se levou dano recente, pisca
            if (this.hitCooldown) ctx.globalAlpha = 0.5;

            // --- DESENHO DO BONECO ---
            ctx.fillStyle = this.color;
            // Cabeça
            ctx.fillRect(-15, -45, 30, 30);
            // Corpo
            ctx.fillRect(-20, -15, 40, 45);
            // Braço (base)
            ctx.fillStyle = "#ecf0f1";
            ctx.fillRect(this.facing * 15, -5, 15, 10);

            // --- DESENHO DA ESPADA ---
            ctx.save();
            if (this.isAttacking) {
                // Animação de arco de ataque
                ctx.rotate(this.attackAngle);
            }
            
            // Lâmina
            ctx.fillStyle = this.damage > 5 ? "#f1c40f" : "#bdc3c7";
            ctx.fillRect(this.facing * 25, -35, 8 * this.facing, 45);
            // Guarda da espada
            ctx.fillStyle = "#7f8c8d";
            ctx.fillRect(this.facing * 20, -5, 15 * this.facing, 5);
            ctx.restore();

            ctx.restore();
        }

        update() {
            if (this.hp <= 0) return;

            // Movimento
            let moved = false;
            if (keys[this.controls.up] && this.y > 0) this.y -= this.speed;
            if (keys[this.controls.down] && this.y < canvas.height - this.height) this.y += this.speed;
            if (keys[this.controls.left] && this.x > 0) { this.x -= this.speed; this.facing = -1; moved = true; }
            if (keys[this.controls.right] && this.x < canvas.width - this.width) { this.x += this.speed; this.facing = 1; moved = true; }

            // Ataque
            if (keys[this.controls.attack] && this.canAttack) {
                this.startAttack();
            }

            // Coleta de itens
            items.forEach((item, index) => {
                if (Math.abs(this.x - item.x) < 30 && Math.abs(this.y - item.y) < 30) {
                    this.damage += 10;
                    document.getElementById(`w${this.id}`).innerText = `Espada Lendária (Dano: ${this.damage})`;
                    items.splice(index, 1);
                }
            });
        }

        startAttack() {
            this.isAttacking = true;
            this.canAttack = false;
            this.attackAngle = -1; // Ângulo inicial

            // Lógica de colisão do ataque
            let enemy = (this.id === 1) ? p2 : p1;
            let reach = 60;
            let hitX = this.x + (this.facing === 1 ? this.width : -reach);
            
            // Verifica se o inimigo está na área do golpe
            if (hitX < enemy.x + enemy.width && hitX + reach > enemy.x &&
                this.y < enemy.y + enemy.height && this.y + this.height > enemy.y) {
                
                enemy.takeDamage(this.damage);
            }

            // Animação da espada descendo
            let anim = setInterval(() => {
                this.attackAngle += 0.2;
                if (this.attackAngle >= 1) {
                    clearInterval(anim);
                    this.isAttacking = false;
                    this.attackAngle = 0;
                }
            }, 20);

            // Cooldown global do ataque
            setTimeout(() => { this.canAttack = true; }, 600);
        }

        takeDamage(amt) {
            if (this.hitCooldown) return;
            this.hp -= amt;
            this.hitCooldown = true;
            document.getElementById(`hp${this.id}`).style.width = Math.max(0, this.hp) + "%";
            
            // Empurrão
            this.x += (this.id === 1) ? -30 : 30;

            setTimeout(() => { this.hitCooldown = false; }, 400);
        }
    }

    const p1 = new Player(100, 200, "#3498db", { up: "KeyW", down: "KeyS", left: "KeyA", right: "KeyD", attack: "KeyC" }, 1);
    const p2 = new Player(650, 200, "#e74c3c", { up: "ArrowUp", down: "ArrowDown", left: "ArrowLeft", right: "ArrowRight", attack: "Space" }, 2);

    // Spawn de armas
    setInterval(() => {
        if (items.length < 1) {
            items.push({ x: Math.random() * 600 + 100, y: Math.random() * 300 + 50 });
        }
    }, 8000);

    function drawItems() {
        items.forEach(item => {
            ctx.fillStyle = "#f1c40f";
            ctx.beginPath();
            ctx.arc(item.x, item.y, 10, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.fillText("ESPADONA", item.x - 25, item.y - 15);
        });
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Chão simples
        ctx.fillStyle = "#34495e";
        ctx.fillRect(0, 400, 800, 50);

        if (p1.hp > 0 && p2.hp > 0) {
            p1.update(); p2.update();
            drawItems();
            p1.draw(); p2.draw();
            requestAnimationFrame(gameLoop);
        } else {
            ctx.fillStyle = "white";
            ctx.font = "40px Arial Black";
            ctx.textAlign = "center";
            ctx.fillText("VITÓRIA DO P" + (p1.hp > 0 ? "1" : "2"), canvas.width/2, canvas.height/2);
        }
    }

    gameLoop();
</script>
</body>
</html>
